<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | VAREYA</title>
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="portal-container">
        <div class="portal-card">
            <h2 id="form-title">Student Login</h2>
            
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p class="switch-text">Don't have an account? <span id="show-register">Register here</span></p>
            </form>

            <form id="register-form" style="display: none;">
                <input type="text" id="reg-name" placeholder="Full Name" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="Matric Number" id="reg-username" placeholder="Matric Number" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit">Register</button>
                <p class="switch-text">Already have an account? <span id="show-login">Login here</span></p>
            </form>
        </div>
    </div>

    <script src="portal.js"></script>
</body>
</html>
